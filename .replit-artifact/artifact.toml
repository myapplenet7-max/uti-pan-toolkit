kind = "web"
previewPath = "/"
title = "UTI PAN Toolkit"
version = "1.0.0"
id = "artifacts/uti-toolkit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23932

[services.development]
run = "pnpm --filter @workspace/uti-toolkit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uti-toolkit", "run", "build" ]
publicDir = "artifacts/uti-toolkit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23932"
BASE_PATH = "/"
